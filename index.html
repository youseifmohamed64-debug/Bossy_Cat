<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bossy Cat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="question-container">
        <img src="start.png" id="main-gif" class="local-gif">
        
         <div id="real-photos" class="photos-flex" style="display: none;">
         <div class="floating-heart">❤️</div> <div class="photo-frame her-frame"><img src="b.jpg"></div>
         <div class="photo-frame my-frame"><img src="y.jpg"></div>
         </div>
        <h1 id="question-text" class="question">Do you love me?</h1>

        <div class="button-container">
            <button id="yes-btn" class="btn btn-yes">Yes</button>
            <button id="no-btn" class="btn btn-no">No</button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
